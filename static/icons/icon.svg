<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="life-os">
  <title>life-os</title>
  <desc>Four L-shaped corner brackets framing a centered dot. Slate signature color.</desc>

  <!-- Brackets: viewfinder corners. Stroke width 14 reads well from 16px to 512px. -->
  <g fill="none" stroke="#4A5568" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Top-left bracket -->
    <path d="M 26 70 L 26 26 L 70 26"/>
    <!-- Top-right bracket -->
    <path d="M 186 26 L 230 26 L 230 70"/>
    <!-- Bottom-right bracket -->
    <path d="M 230 186 L 230 230 L 186 230"/>
    <!-- Bottom-left bracket -->
    <path d="M 70 230 L 26 230 L 26 186"/>
  </g>

  <!-- Focal dot. Same slate. Diameter ~30% of canvas reads at 16px without disappearing. -->
  <circle cx="128" cy="128" r="36" fill="#4A5568"/>
</svg>
