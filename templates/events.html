{% extends "base.html" %}
{% block title %}Clinical event — Cairn{% endblock %}
{% block content %}
<h1>Clinical event</h1>
<p class="muted">{{ today }}. Discrete events that anchor your timeline: surgeries, follow-ups, sleep studies, semester markers.</p>

<form method="post" autocomplete="off">
  <label for="date">Date</label>
  <input type="date" name="date" id="date" value="{{ today }}" required>

  <fieldset>
    <legend>Event</legend>
    <label for="label">Label</label>
    <input type="text" name="label" id="label" required placeholder="e.g., Sleeve gastrectomy">

    <label for="event_type">Event type</label>
    <input type="text" name="event_type" id="event_type" required placeholder="e.g., surgery, follow_up, sleep_study, liquid_diet_start">

    <label for="category">Category</label>
    <select name="category" id="category" required>
      <option value="">—</option>
      <option value="bariatric">Bariatric</option>
      <option value="medication">Medication</option>
      <option value="sleep">Sleep</option>
      <option value="clinical">Clinical (general)</option>
      <option value="calendar">Calendar / academic</option>
      <option value="life">Life</option>
    </select>

    <label for="certainty">Certainty</label>
    <select name="certainty" id="certainty">
      <option value="">—</option>
      <option value="assumed">Assumed (planned, unconfirmed)</option>
      <option value="confirmed">Confirmed</option>
    </select>
  </fieldset>

  <fieldset>
    <legend>Sleep study / CPAP fields (optional)</legend>
    <div class="row3">
      <div>
        <label for="ahi">AHI</label>
        <input type="number" step="0.1" name="ahi" id="ahi" inputmode="decimal">
      </div>
      <div>
        <label for="cpap_pressure">CPAP pressure</label>
        <input type="text" name="cpap_pressure" id="cpap_pressure" placeholder="e.g., 9 cmH2O">
      </div>
      <div>
        <label for="cpap_hours">CPAP hours/night</label>
        <input type="number" step="0.1" name="cpap_hours" id="cpap_hours" inputmode="decimal">
      </div>
    </div>
    <label for="mask_type">Mask type</label>
    <input type="text" name="mask_type" id="mask_type">
  </fieldset>

  <label for="notes">Notes</label>
  <input type="text" name="notes" id="notes">

  <button type="submit">Save event</button>
</form>
{% endblock %}
