<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>{% block title %}life-os{% endblock %}</title>

<!-- Favicons -->
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='icons/icon.svg') }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32.png') }}">
<link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">

<!-- PWA wiring -->
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#1A202C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="life-os">

<!-- life-os brand tokens. See C:\life-os\meta\design\brand\brand.md -->
<link rel="stylesheet" href="{{ url_for('static', filename='tokens.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js", { scope: "/" })
        .catch((err) => console.warn("SW registration failed", err));
    });
  }
</script>
</head>
<body>
<header>
  <a href="{{ url_for('index') }}" class="home-link">
    <svg class="brand-mark" viewBox="0 0 256 256" aria-hidden="true">
      <g fill="none" stroke="currentColor" stroke-width="14" stroke-linecap="square" stroke-linejoin="miter">
        <path d="M 26 70 L 26 26 L 70 26"/>
        <path d="M 186 26 L 230 26 L 230 70"/>
        <path d="M 230 186 L 230 230 L 186 230"/>
        <path d="M 70 230 L 26 230 L 26 186"/>
      </g>
      <circle cx="128" cy="128" r="36" fill="currentColor"/>
    </svg>
    <span class="brand-word">life-os</span>
  </a>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
